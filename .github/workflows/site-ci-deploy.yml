name: Site CI and Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, prove, and smoke test
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --destination "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Verify generated homepage
        run: bash tools/verify-built-site.sh "_site${{ steps.pages.outputs.base_path }}"

      - name: Run HTMLProofer
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke test
        run: pnpm test
        env:
          SITE_DIR: "_site${{ steps.pages.outputs.base_path }}"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:4000"
          HOMEPAGE_SCREENSHOT_PATH: "test-results/homepage.png"

      - name: Upload homepage screenshot
        if: github.event_name == 'pull_request' && always()
        id: homepage_screenshot
        uses: actions/upload-artifact@v7
        with:
          name: homepage-screenshot-pr-${{ github.event.pull_request.number }}
          path: test-results/homepage.png
          if-no-files-found: warn
          retention-days: 14

      - name: Comment homepage screenshot on PR
        if: github.event_name == 'pull_request' && always() && github.event.pull_request.head.repo.full_name == github.repository && steps.homepage_screenshot.outputs['artifact-url'] != ''
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- homepage-screenshot-artifact -->';
            const artifactUrl = "${{ steps.homepage_screenshot.outputs['artifact-url'] }}";
            const body = [
              marker,
              '### Homepage screenshot',
              '',
              `Built from commit \`${context.sha}\`.`,
              '',
              `[Download the homepage screenshot artifact](${artifactUrl})`,
              '',
              `Workflow run: ${{ github.server_url }}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload site artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm
    needs: build

    permissions:
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify Pages publish mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          build_type="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.build_type')"

          if [[ "$build_type" != "workflow" ]]; then
            echo "GitHub Pages build_type must be workflow, got: $build_type" >&2
            echo "Legacy branch publishing can serve raw Jekyll source before the custom deploy finishes." >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live homepage
        run: |
          bash tools/verify-live-site.sh \
            "${{ steps.deployment.outputs.page_url }}" \
            "https://harshityadav.in"
