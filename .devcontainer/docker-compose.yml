services:
  jekyll:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      # Bind-mount the repo into the container
      - ..:/workspace:cached
      # Persist bundler gems across rebuilds
      - bundle-cache:/usr/local/bundle
    ports:
      - "4000:4000"
      - "35729:35729"
    # Keep container alive for VS Code to attach
    command: sleep infinity
    environment:
      - JEKYLL_ENV=development
      - BUNDLE_PATH=/usr/local/bundle

volumes:
  bundle-cache:
